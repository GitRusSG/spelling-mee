name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export static web build
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Prepare for GitHub Pages subdirectory deployment
        run: |
          # Move everything into a subdirectory matching the repo name
          mkdir -p deploy/spelling-mee
          cp -r dist/* deploy/spelling-mee/
          # Create a root index.html that redirects to the subdirectory
          echo '<meta http-equiv="refresh" content="0;url=/spelling-mee/">' > deploy/index.html
          # Copy 404.html to root for SPA fallback routing
          cp deploy/spelling-mee/index.html deploy/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
